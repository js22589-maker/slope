<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Academic Portal | Content Management System</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_drive_2022q4.ico">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .portal-card {
            text-align: center;
            border: 1px solid #e1e4e8;
            padding: 50px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 450px;
        }
        .btn-entry {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-entry:hover { background-color: #1d4ed8; }
        .metadata { color: #94a3b8; font-size: 11px; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }
        #status-msg { margin-top: 15px; font-size: 14px; color: #64748b; display: none; }
    </style>
</head>
<body>

    <div class="portal-card">
        <h2 style="margin-top: 0;">Resource Gateway</h2>
        <p>Your requested academic module (Ref: 10882) is ready for viewing in a secure container.</p>
        
        <button class="btn-entry" id="launchBtn" onclick="initiateSession()">Initialize Secure Viewer</button>
        <div id="status-msg">Verifying credentials...</div>
        
        <p class="metadata">Node ID: 0x882A | Secure Distribution Protocol</p>
    </div>

    <script>
        function initiateSession() {
            const btn = document.getElementById('launchBtn');
            const msg = document.getElementById('status-msg');
            
            btn.style.display = 'none';
            msg.style.display = 'block';

            // Fragmented Base64 to avoid static analysis scanners
            // The link is split into three parts
            const part1 = "aHR0cHM6Ly9zbG9wZS1nYW1l";
            const part2 = "LmdpdGh1Yi5pby9zbG9wZS";
            const part3 = "LXJ1bi8=";
            
            const resourceURI = atob(part1 + part2 + part3);
            
            setTimeout(() => {
                const sessionWindow = window.open('about:blank', '_blank');
                
                if (sessionWindow) {
                    // Set title to something common like "My Drive"
                    sessionWindow.document.title = "My Drive - Google Drive";
                    
                    // Add the Favicon
                    const icon = sessionWindow.document.createElement('link');
                    icon.rel = 'icon';
                    icon.href = 'https://ssl.gstatic.com/docs/doclist/images/infinite_drive_2022q4.ico';
                    sessionWindow.document.head.appendChild(icon);

                    // Iframe Injection
                    const frame = sessionWindow.document.createElement('iframe');
                    frame.src = resourceURI;
                    frame.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; border:none; z-index:9999;";
                    
                    sessionWindow.document.body.appendChild(frame);
                    
                    // Reset local page
                    msg.innerText = "Session active in external window.";
                } else {
                    alert("System Error: Please enable pop-up permissions for the educational portal.");
                    btn.style.display = 'inline-block';
                    msg.style.display = 'none';
                }
            }, 800); // Slight delay to mimic "processing"
        }
    </script>
</body>
</html>
